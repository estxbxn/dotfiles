[colors]
background = #AA1e1e2e
foreground = #cdd6f4
primary = #cba6f7
secondary = #89b4fa
alert = #f38ba8

[bar/example]
tray-position = right
tray-padding = 4
width = 100%
height = 28
background = ${colors.background}
foreground = ${colors.foreground}
monitor = ${env:MONITOR:DP-0}
font-0 = JetBrainsMono Nerd Font:size=9;2
font-1 = Font Awesome 7 Free:style=Solid:size=10;2
modules-left = i3 xwindow
modules-center = spotify
modules-right = volume network cpu memory date
padding = 2
separator = "  "

[module/i3]
type = internal/i3
format = <label-state>
label-focused = %index%
label-focused-foreground = #1e1e2e
label-focused-background = #cba6f7
label-focused-padding = 2
label-unfocused = %index%
label-unfocused-foreground = #cdd6f4
label-unfocused-background = #313244
label-unfocused-padding = 2

[module/xwindow]
type = internal/xwindow
label = %title:0:50:...%
label-foreground = #6c7086

[module/spotify]
type = custom/script
exec = if [ "$(playerctl --player=spotify status 2>/dev/null)" = "Playing" ]; then echo " $(playerctl --player=spotify metadata --format ' {{ artist }} - {{ title }} ') "; else echo " $(playerctl --player=spotify metadata --format ' {{ artist }} - {{ title }} ') "; fi
click-left = playerctl previous
click-middle = playerctl play-pause
click-right = playerctl next
interval = 2

[module/volume]
type = internal/pulseaudio
format-volume = <ramp-volume> <label-volume>
label-volume = %percentage%%
label-muted = 󰝟 muted
label-muted-foreground = #6c7086
ramp-volume-0 = 󰕿
ramp-volume-1 = 󰖀
ramp-volume-2 = 󰕾
ramp-volume-foreground = ${colors.primary}

[module/cpu]
type = internal/cpu
interval = 2
format-prefix = " "
format-prefix-foreground = ${colors.primary}
label = %percentage:2%%

[module/memory]
type = internal/memory
interval = 2
format-prefix = " "
format-prefix-foreground = ${colors.primary}
label = %percentage_used:2%%

[module/network]
type = internal/network
interface = enp6s0
interval = 2
format-connected-prefix = "󰀂 "
format-connected-prefix-foreground = ${colors.primary}
label-connected = %downspeed%

[module/date]
type = internal/date
interval = 1
date =  %H:%M %a    %d %b
label = %date%
label-foreground = #1e1e2e
label-background = #cba6f7
label-padding = 2

[settings]
screenchange-reload = true
